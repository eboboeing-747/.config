unbind r
bind-key r source-file ~/.config/tmux/tmux.conf

set -g prefix C-u

# copy-mode (normal mode) vim motions
unbind-key -T copy-mode-vi 'C-c'
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel 'xclip -in -selection clipboard'
bind-key -T copy-mode-vi i send -X cancel
bind-key -T copy-mode-vi 'C-c' send -X clear-selection
bind-key -T copy-mode-vi ':' command-prompt
bind-key -T copy-mode-vi 'C-v' 'send -X begin-selection; send -X rectangle-on'
unbind-key -T copy-mode-vi v
bind-key -T copy-mode-vi v 'send -X begin-selection; send -X rectangle-off'

bind-key -n Escape if-shell "$is_vim" 'send-keys Escape' 'copy-mode'
# bind-key -n 'C-c' if-shell "$is_vim" 'send-keys C-c' 'copy-mode' # prevents SIGINTing in shell
bind-key -n 'C-c' 'send-keys C-c'

bind-key -n 'M-t' 'new-window; copy-mode'
bind-key -n 'M-c' kill-pane

bind-key -n 'M-H' swap-window -t -1\; select-window -t -1
bind-key -n 'M-L' swap-window -t +1\; select-window -t +1

bind-key -n 'M-C-h' previous-window
bind-key -n 'M-C-l' next-window
